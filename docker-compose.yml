version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: agentos-db
    restart: always
    environment:
      POSTGRES_DB: agentos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentos-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agentos
      - JWT_SECRET=super_secret_jwt_key_please_change_in_production_1234567890
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/v1/auth/callback
      - GEMINI_API_KEY=
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/workspace
      - /workspace/app/.venv # don't overwrite container venv if any

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentos-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules # don't overwrite container node_modules

volumes:
  pgdata:
